version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: resort-chatbot-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: resort-chatbot
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: resort-chatbot-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/resort-chatbot
      ADMIN_KEY: dev-key
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./server:/app/server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  frontend:
    image: node:18-alpine
    container_name: resort-chatbot-frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    command: pnpm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  mongodb_data:

networks:
  default:
    name: resort-chatbot-network
